<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Noto Sans TC", sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      .app {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .panel {
        background: #fff;
        border-right: 1px solid #dbe3ee;
        display: flex;
        flex-direction: column;
        transition: width 0.2s ease;
        overflow: hidden;
      }

      .panel-1 {
        width: 300px;
      }

      .panel-2 {
        width: 320px;
      }

      .panel.collapsed {
        width: 44px !important;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 12px;
        border-bottom: 1px solid #eef2f7;
        min-height: 56px;
      }

      .panel-title-wrap {
        min-width: 0;
        flex: 1;
      }

      .panel-title {
        font-size: 18px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panel-subtitle {
        font-size: 12px;
        color: #6b7280;
        margin-top: 4px;
      }

      .panel.collapsed .panel-title-wrap,
      .panel.collapsed .panel-body {
        display: none;
      }

      .toggle-btn {
        width: 28px;
        height: 28px;
        border: 1px solid #d0d7e2;
        background: #fff;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .search-area {
        padding: 12px;
        border-bottom: 1px solid #eef2f7;
      }

      .panel.collapsed .search-area {
        display: none;
      }

      .search-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cfd8e3;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
      }

      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .item,
      .subfolder-header,
      .subfile-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 10px;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
      }

      .item:hover,
      .subfolder-header:hover,
      .subfile-item:hover {
        background: #f3f7fd;
      }

      .item.active,
      .subfile-item.active {
        background: #eaf2ff;
      }

      .item-icon,
      .subfile-icon {
        width: 18px;
        text-align: center;
        flex: 0 0 18px;
      }

      .item-name {
        flex: 1;
        min-width: 0;
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
      }

      .folder-block {
        margin-bottom: 6px;
      }

      .subfolder-files {
        margin-left: 22px;
        padding-left: 8px;
        border-left: 1px solid #dbe3ee;
        display: none;
      }

      .subfolder-files.expanded {
        display: block;
      }

      .viewer-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .viewer-header {
        background: #fff;
        border-bottom: 1px solid #dbe3ee;
        padding: 16px 20px;
      }

      .viewer-title {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.25;
        margin: 0;
      }

      .viewer-meta {
        margin-top: 8px;
        font-size: 13px;
        color: #6b7280;
      }

      .viewer-actions {
        margin-top: 10px;
      }

      .viewer-btn {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 8px;
        background: #1d4ed8;
        color: #fff;
        text-decoration: none;
        font-size: 13px;
      }

      .viewer-btn:hover {
        background: #1e40af;
      }

      .viewer-body {
        flex: 1;
        padding: 16px;
        overflow: hidden;
      }

      .viewer-card {
        width: 100%;
        height: 100%;
        background: #fff;
        border: 1px solid #dbe3ee;
        border-radius: 14px;
        overflow: hidden;
      }

      .viewer-frame,
      .viewer-image {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .viewer-image {
        object-fit: contain;
        background: #f8fafc;
      }

      .empty-state {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 16px;
        text-align: center;
        padding: 24px;
      }

      .collapsed-placeholder {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        color: #6b7280;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 10px 0;
      }

      .panel.collapsed .collapsed-placeholder {
        display: flex;
      }

      @media (max-width: 1100px) {
        .panel-1 {
          width: 240px;
        }

        .panel-2 {
          width: 260px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- 第一階 -->
      <aside id="panel1" class="panel panel-1">
        <div class="panel-header">
          <div class="panel-title-wrap">
            <div class="panel-title">Lumens 產品彈藥庫</div>
            <div class="panel-subtitle">Root 內容</div>
          </div>
          <button class="toggle-btn" onclick="togglePanel('panel1', this)">«</button>
        </div>

        <div class="search-area">
          <input id="searchInput" class="search-input" type="text" placeholder="搜尋第一階..." oninput="renderRootPanel()" />
        </div>

        <div id="panel1Body" class="panel-body"></div>
        <div class="collapsed-placeholder">第一階</div>
      </aside>

      <!-- 第二階 -->
      <aside id="panel2" class="panel panel-2">
        <div class="panel-header">
          <div class="panel-title-wrap">
            <div id="panel2Title" class="panel-title">第二階面板</div>
            <div id="panel2Subtitle" class="panel-subtitle">請先點選第一階的主資料夾</div>
          </div>
          <button class="toggle-btn" onclick="togglePanel('panel2', this)">«</button>
        </div>

        <div id="panel2Body" class="panel-body">
          <div class="empty-state">請先從第一階選擇一個主資料夾</div>
        </div>
        <div class="collapsed-placeholder">第二階</div>
      </aside>

      <!-- 右側內容 -->
      <main class="viewer-area">
        <div class="viewer-header">
          <h1 id="viewerTitle" class="viewer-title">請選擇文件</h1>
          <div id="viewerMeta" class="viewer-meta">左側點擊文件後，會在這裡顯示內容</div>
          <div class="viewer-actions">
            <a id="openOriginalBtn" class="viewer-btn" href="#" target="_blank" style="display:none;">Open in Google Drive</a>
          </div>
        </div>

        <div class="viewer-body">
          <div id="viewerCard" class="viewer-card">
            <div class="empty-state">請從左側面板選擇要顯示的文件</div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let knowledgeTree = null;
      let selectedRootFolderId = null;
      let activeFileId = null;
      let expandedSubfolders = {};

      function init() {
        google.script.run
          .withSuccessHandler(onTreeLoaded)
          .withFailureHandler(onLoadError)
          .getKnowledgeTree();
      }

      function onTreeLoaded(data) {
        knowledgeTree = data;
        renderRootPanel();
      }

      function onLoadError(err) {
        document.getElementById('panel1Body').innerHTML =
          '<div class="empty-state">載入失敗：' + escapeHtml(err.message || err) + '</div>';
      }

      function togglePanel(panelId, btn) {
        const panel = document.getElementById(panelId);
        panel.classList.toggle('collapsed');
        btn.textContent = panel.classList.contains('collapsed') ? '»' : '«';
      }

      function renderRootPanel() {
        if (!knowledgeTree) return;

        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const body = document.getElementById('panel1Body');

        let items = knowledgeTree.items || [];
        if (keyword) {
          items = items.filter(item => item.name.toLowerCase().includes(keyword));
        }

        if (!items.length) {
          body.innerHTML = '<div class="empty-state">找不到符合的項目</div>';
          return;
        }

        body.innerHTML = items.map(item => {
          const isActiveFolder = item.itemType === 'folder' && item.id === selectedRootFolderId;
          const isActiveFile = item.itemType === 'file' && item.id === activeFileId;

          return `
            <div class="folder-block">
              <div class="item ${isActiveFolder || isActiveFile ? 'active' : ''}" onclick="handleRootItemClick('${item.id}')">
                <div class="item-icon">${getIcon(item)}</div>
                <div class="item-name">${escapeHtml(item.name)}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      function handleRootItemClick(itemId) {
        const item = (knowledgeTree.items || []).find(x => x.id === itemId);
        if (!item) return;

        if (item.itemType === 'file') {
          selectedRootFolderId = null;
          activeFileId = item.id;
          renderRootPanel();
          clearSecondPanel();
          openFile(item);
          return;
        }

        if (item.itemType === 'folder') {
          selectedRootFolderId = item.id;
          activeFileId = null;
          renderRootPanel();
          renderSecondPanel(item);
        }
      }

      function renderSecondPanel(folderItem) {
        const title = document.getElementById('panel2Title');
        const subtitle = document.getElementById('panel2Subtitle');
        const body = document.getElementById('panel2Body');

        title.textContent = folderItem.name;
        subtitle.textContent = '顯示主資料夾內的文件與子資料夾';

        const children = folderItem.children || [];
        if (!children.length) {
          body.innerHTML = '<div class="empty-state">此主資料夾尚無內容</div>';
          return;
        }

        body.innerHTML = children.map(item => {
          if (item.itemType === 'file') {
            return `
              <div class="item ${item.id === activeFileId ? 'active' : ''}" onclick="openSecondLevelFile('${folderItem.id}','${item.id}')">
                <div class="item-icon">${getIcon(item)}</div>
                <div class="item-name">${escapeHtml(item.name)}</div>
              </div>
            `;
          }

          const expanded = !!expandedSubfolders[item.id];
          const subFiles = item.children || [];

          return `
            <div class="folder-block">
              <div class="subfolder-header" onclick="toggleSubfolder('${folderItem.id}', '${item.id}')">
                <div class="item-icon">${expanded ? '▼' : '▶'}</div>
                <div class="item-icon">📁</div>
                <div class="item-name">${escapeHtml(item.name)}</div>
              </div>

              <div class="subfolder-files ${expanded ? 'expanded' : ''}" id="subfolder-${item.id}">
                ${subFiles.length
                  ? subFiles.map(f => `
                    <div class="subfile-item ${f.id === activeFileId ? 'active' : ''}" onclick="event.stopPropagation(); openThirdLevelFile('${folderItem.id}', '${item.id}', '${f.id}')">
                      <div class="subfile-icon">${getIcon(f)}</div>
                      <div class="item-name">${escapeHtml(f.name)}</div>
                    </div>
                  `).join('')
                  : '<div class="empty-state" style="height:auto; padding:12px;">此子資料夾沒有文件</div>'
                }
              </div>
            </div>
          `;
        }).join('');
      }

      function clearSecondPanel() {
        document.getElementById('panel2Title').textContent = '第二階面板';
        document.getElementById('panel2Subtitle').textContent = '請先點選第一階的主資料夾';
        document.getElementById('panel2Body').innerHTML =
          '<div class="empty-state">請先從第一階選擇一個主資料夾</div>';
      }

      function openSecondLevelFile(rootFolderId, fileId) {
        const rootFolder = (knowledgeTree.items || []).find(x => x.id === rootFolderId);
        if (!rootFolder) return;

        const fileItem = (rootFolder.children || []).find(x => x.id === fileId && x.itemType === 'file');
        if (!fileItem) return;

        activeFileId = fileItem.id;
        renderSecondPanel(rootFolder);
        renderRootPanel();
        openFile(fileItem);
      }

      function toggleSubfolder(rootFolderId, subfolderId) {
        expandedSubfolders[subfolderId] = !expandedSubfolders[subfolderId];

        const rootFolder = (knowledgeTree.items || []).find(x => x.id === rootFolderId);
        if (!rootFolder) return;

        renderSecondPanel(rootFolder);
      }

      function openThirdLevelFile(rootFolderId, subfolderId, fileId) {
        const rootFolder = (knowledgeTree.items || []).find(x => x.id === rootFolderId);
        if (!rootFolder) return;

        const subfolder = (rootFolder.children || []).find(x => x.id === subfolderId && x.itemType === 'folder');
        if (!subfolder) return;

        const fileItem = (subfolder.children || []).find(x => x.id === fileId && x.itemType === 'file');
        if (!fileItem) return;

        activeFileId = fileItem.id;
        expandedSubfolders[subfolderId] = true;

        renderSecondPanel(rootFolder);
        renderRootPanel();
        openFile(fileItem);
      }

      function openFile(fileItem) {
        document.getElementById('viewerTitle').textContent = fileItem.name;
        document.getElementById('viewerMeta').textContent = 'Type: ' + (fileItem.fileType || 'file');

        const btn = document.getElementById('openOriginalBtn');
        btn.href = fileItem.openLink || fileItem.previewLink || '#';
        btn.style.display = 'inline-block';

        const viewer = document.getElementById('viewerCard');

        if (fileItem.fileType === 'image') {
          viewer.innerHTML = `
            <img class="viewer-image" src="${escapeAttr(fileItem.previewLink)}" alt="${escapeAttr(fileItem.name)}">
          `;
          return;
        }

        viewer.innerHTML = `
          <iframe class="viewer-frame" src="${escapeAttr(fileItem.previewLink)}" allowfullscreen></iframe>
        `;
      }

      function getIcon(item) {
        if (item.itemType === 'folder') return '📁';

        switch (item.fileType) {
          case 'doc': return '📄';
          case 'slides': return '🖼️';
          case 'sheet': return '📊';
          case 'pdf': return '📕';
          case 'image': return '🖼️';
          case 'video': return '🎬';
          default: return '📎';
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttr(str) {
        return escapeHtml(str);
      }

      window.onload = init;
    </script>
  </body>
</html>
